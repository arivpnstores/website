name: Server Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run server checks
        run: node check-servers.js

      - name: Commit and push status.json
        run: |
          git config user.name "Server Monitor"
          git config user.email "monitor@rajaserver.web.id"
          git add status/status.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update status.json [skip ci]" --allow-empty
            git push origin HEAD
          fi
